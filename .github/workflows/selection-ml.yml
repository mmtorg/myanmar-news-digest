name: Selection ML

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: false
        default: "predict"
        type: choice
        options:
          - predict
      spreadsheet_id:
        description: "Current spreadsheet ID"
        required: true
        type: string
      archive_folder_id:
        description: "Drive folder containing monthly archive spreadsheets"
        required: true
        type: string
      target_sheet:
        description: "Output sheet"
        required: true
        default: "dev"
        type: choice
        options:
          - prod
          - dev

permissions:
  contents: read

concurrency:
  group: selection-ml-${{ inputs.spreadsheet_id }}-${{ inputs.target_sheet }}
  cancel-in-progress: false

jobs:
  selection-ml:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "google-api-python-client>=2.0.0" \
            "google-auth>=2.0.0" \
            "scikit-learn>=1.3,<2" \
            "google-genai>=1.0.0"

      - name: Run Selection ML
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ inputs.spreadsheet_id }}
          ARCHIVE_FOLDER_ID: ${{ inputs.archive_folder_id }}
          TARGET_SHEET: ${{ inputs.target_sheet }}
          MODE: ${{ inputs.mode }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SHEETS_WRITE_CHUNK_ROWS: "25"
          SHEETS_WRITE_MAX_PAYLOAD_BYTES: "1800000"
          SHEETS_WRITE_MAX_RETRIES: "6"
          SHEETS_WRITE_RETRY_BASE_SECONDS: "2"
          SHEETS_WRITE_RETRY_MAX_SECONDS: "32"
        run: python -m selection_ml.run_selection_ml
